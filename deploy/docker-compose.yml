services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mgp}
      POSTGRES_USER: ${POSTGRES_USER:-mgp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mgp}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mgp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-mgp}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-mgp}
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # 管理界面 http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-mgp}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-mgpsecret}
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # 控制台 http://localhost:9001
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  minio_data:
