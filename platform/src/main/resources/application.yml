server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mgp
    username: mgp
    password: mgp
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  rabbitmq:
    host: localhost
    port: 5672
    username: mgp
    password: mgp
  data:
    redis:
      host: localhost
      port: 6379

mgp:
  queue:
    tasks: gen.tasks
  redis:
    progress-channel: task.progress
  minio:
    endpoint: http://localhost:9000
    access-key: mgp
    secret-key: mgpsecret
    bucket: audio
  jwt:
    # 生产请用环境变量覆盖：MGP_JWT_SECRET（至少 32 字节）
    secret: ${MGP_JWT_SECRET:dev-secret-change-me-please-32bytes-min!!}
    expiration-ms: 86400000
